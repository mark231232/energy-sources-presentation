<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Презентація: Джерела енергії</title>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0f172a; color: var(--dark); }
        .container { width: 95%; max-width: 800px; height: 550px; background: var(--light); border-radius: 15px; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px; box-sizing: border-box; display: none; flex-direction: column; justify-content: center; animation: fadeIn 0.4s; }
        .slide.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        h1, h2 { color: var(--primary); }
        ul { font-size: 1.1rem; line-height: 1.5; }
        li { margin-bottom: 8px; }
        .controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; border: none; background: var(--primary); color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #cbd5e1; }
        .slide-num { position: absolute; bottom: 25px; left: 20px; font-size: 0.8rem; color: #64748b; }
        .warning { background: #fef2f2; padding: 10px; border-left: 4px solid #ef4444; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="slide active">
        <h2>Розвиток відновлюваної енергії</h2>
        <p>Content related to renewable energy development...</p>
    </div>
    <div class="slide">
        <h2>Акумулятори та енергозбереження</h2>
        <p>Content related to batteries and energy conservation...</p>
    </div>
    <div class="slide">
        <h1>Джерела електричної енергії</h1>
        <p>Content related to sources of electric energy...</p>
    </div>
    <!-- Additional slides could be inserted here... -->
    <div class="controls">
        <button id="prev-slide">Назад</button>
        <button id="next-slide">Вперёд</button>
        <!-- Placeholder for CSS etc... -->
    </div>
